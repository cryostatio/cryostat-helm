{{/*
   Alpha Configuration is not used with OpenShift OAuth Proxy
*/}}
{{- if not (.Values.authentication.openshift).enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-alpha-config
  labels:
    {{- include "cryostat.labels" . | nindent 4 }}
data:
  alpha_config.yaml: |-
    server:
      BindAddress: http://0.0.0.0:4180
      {{- if or .Values.oauth2Proxy.tls.selfSigned.enabled ((include "cryostat.certManager.enabled" .) | eq "true") }}
      SecureBindAddress: https://0.0.0.0:8443
      TLS:
        Key:
          {{- if (include "cryostat.certManager.enabled" .) | eq "true" }}
          fromFile: /etc/cryostat-tls/tls.key
          {{- else }}
          fromFile: /etc/tls/private/key
          {{- end }}
        Cert:
          {{- if (include "cryostat.certManager.enabled" .) | eq "true" }}
          fromFile: /etc/cryostat-tls/tls.crt
          {{- else }}
          fromFile: /etc/tls/private/cert
          {{- end }}
      {{- end}}
    upstreamConfig:
      proxyRawPath: true
      upstreams:
        - id: cryostat
          path: /
          uri: http://localhost:8181
        - id: grafana
          path: /grafana/
          uri: http://localhost:3000
    providers:
      - id: dummy
        name: Unused - Sign In Below
        clientId: CLIENT_ID
        clientSecret: CLIENT_SECRET
        provider: google
{{- end }}
