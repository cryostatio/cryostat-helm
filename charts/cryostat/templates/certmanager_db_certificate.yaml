{{- if and (include "cryostat.certManager.enabled" . | eq "true") (empty .Values.db.provider.url) }}
{{- $fullName := include "cryostat.fullname" . }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-db-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cryostat.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  secretName: {{ include "cryostat.tls.db.secretName" . }}
  duration: {{ .Values.tls.certManager.duration }}
  renewBefore: {{ .Values.tls.certManager.renewBefore }}
  subject:
    organizations:
      - {{ $fullName }}
  commonName: {{ $fullName }}-db.{{ .Release.Namespace }}.svc
  dnsNames:
    - {{ $fullName }}-db
    - {{ $fullName }}-db.{{ .Release.Namespace }}
    - {{ $fullName }}-db.{{ .Release.Namespace }}.svc
    - {{ $fullName }}-db.{{ .Release.Namespace }}.svc.cluster.local
  usages:
    - digital signature
    - key encipherment
    - server auth
  issuerRef:
    {{- include "cryostat.certManager.issuerRef" . | nindent 4 }}
{{- end }}