suite: Test cert-manager database certificate
templates:
  - certmanager_db_certificate.yaml
tests:
  - it: should not create certificate when cert-manager is disabled
    set:
      tls.certManager.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create certificate when external database is used
    set:
      tls.certManager.enabled: true
      db.provider.url: "jdbc:postgresql://external-db:5432/cryostat"
    asserts:
      - hasDocuments:
          count: 0

  - it: should create certificate when cert-manager is enabled and using managed database
    set:
      tls.certManager.enabled: true
      db.provider.url: ""
    release:
      name: test-release
      namespace: test-namespace
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Certificate
      - equal:
          path: metadata.name
          value: test-release-db-tls
      - equal:
          path: spec.secretName
          value: test-release-db-tls

  - it: should include correct DNS names for database
    set:
      tls.certManager.enabled: true
    release:
      name: my-release
      namespace: my-namespace
    asserts:
      - contains:
          path: spec.dnsNames
          content: my-release-cryostat-db.my-namespace.svc
      - contains:
          path: spec.dnsNames
          content: my-release-cryostat-db.my-namespace.svc.cluster.local

  - it: should have server auth usage
    set:
      tls.certManager.enabled: true
    asserts:
      - contains:
          path: spec.usages
          content: server auth