suite: Test cert-manager reports certificate
templates:
  - certmanager_reports_certificate.yaml
tests:
  - it: should not create certificate when cert-manager is disabled
    set:
      tls.certManager.enabled: false
      reports.replicas: 1
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create certificate when reports replicas is 0
    set:
      tls.certManager.enabled: true
      reports.replicas: 0
    asserts:
      - hasDocuments:
          count: 0

  - it: should create certificate when cert-manager is enabled and reports replicas > 0
    set:
      tls.certManager.enabled: true
      reports.replicas: 2
    release:
      name: test-release
      namespace: test-namespace
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Certificate
      - equal:
          path: metadata.name
          value: test-release-reports-tls
      - equal:
          path: spec.secretName
          value: test-release-reports-tls

  - it: should include correct DNS names for reports
    set:
      tls.certManager.enabled: true
      reports.replicas: 1
    release:
      name: my-release
      namespace: my-namespace
    asserts:
      - contains:
          path: spec.dnsNames
          content: my-release-cryostat-reports.my-namespace.svc
      - contains:
          path: spec.dnsNames
          content: my-release-cryostat-reports.my-namespace.svc.cluster.local