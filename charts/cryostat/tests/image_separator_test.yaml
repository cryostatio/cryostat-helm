suite: test image separator helper
templates:
  - cryostat_deployment.yaml
  - db_deployment.yaml
  - storage_deployment.yaml

tests:
  - it: should use colon separator for tag-based image references (default)
    template: cryostat_deployment.yaml
    set:
      core.image.repository: quay.io/cryostat/cryostat
      core.image.tag: "4.2.0-snapshot"
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="cryostat")].image
          pattern: ^quay\.io/cryostat/cryostat:4\.2\.0-snapshot$

  - it: should auto-detect sha256 hash
    template: cryostat_deployment.yaml
    set:
      core.image.repository: registry.redhat.io/cryostat/cryostat-rhel9
      core.image.tag: sha256:4337c5a288918275f0b9fa5317a6aa2ee96953b1d2b162ce543778d5e5bdb05c
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="cryostat")].image
          pattern: ^registry\.redhat\.io/cryostat/cryostat-rhel9@sha256:[a-f0-9]{64}$

  - it: should auto-detect sha384 hash
    template: cryostat_deployment.yaml
    set:
      core.image.repository: registry.redhat.io/cryostat/cryostat-rhel9
      core.image.tag: sha384:abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="cryostat")].image
          pattern: ^registry\.redhat\.io/cryostat/cryostat-rhel9@sha384:[a-f0-9]{96}$

  - it: should auto-detect sha512 hash
    template: cryostat_deployment.yaml
    set:
      core.image.repository: registry.redhat.io/cryostat/cryostat-rhel9
      core.image.tag: sha512:abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="cryostat")].image
          pattern: ^registry\.redhat\.io/cryostat/cryostat-rhel9@sha512:[a-f0-9]{128}$

  - it: should auto-detect hash for grafana container
    template: cryostat_deployment.yaml
    set:
      grafana.image.repository: registry.redhat.io/cryostat/cryostat-grafana-dashboard-rhel9
      grafana.image.tag: sha256:c8c4c8c171fd17390e229a635d0d9285e3d79bd33a8cce8192b1a0faf52273df
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="cryostat-grafana")].image
          pattern: ^registry\.redhat\.io/cryostat/cryostat-grafana-dashboard-rhel9@sha256:[a-f0-9]{64}$

  - it: should auto-detect hash for datasource container
    template: cryostat_deployment.yaml
    set:
      datasource.image.repository: registry.redhat.io/cryostat/jfr-datasource-rhel9
      datasource.image.tag: sha256:cfdc83d656688c1c4afe8f157dc1a9bee584a35ee9c4fa127f32be05175ecf16
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="cryostat-jfr-datasource")].image
          pattern: ^registry\.redhat\.io/cryostat/jfr-datasource-rhel9@sha256:[a-f0-9]{64}$

  - it: should auto-detect hash for database deployment
    template: db_deployment.yaml
    set:
      db.image.repository: registry.redhat.io/cryostat/cryostat-db-rhel9
      db.image.tag: sha256:febbf0a9813fb16914e2fdc29afec58768b56a0da6974754f43d7efa0e76c133
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^registry\.redhat\.io/cryostat/cryostat-db-rhel9@sha256:[a-f0-9]{64}$

  - it: should auto-detect hash for storage deployment
    template: storage_deployment.yaml
    set:
      storage.image.repository: registry.redhat.io/cryostat/cryostat-storage-rhel9
      storage.image.tag: sha256:c74c32318d1773e54a2d1702631b244f42db99a268be3ec6e438e91497ff1979
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^registry\.redhat\.io/cryostat/cryostat-storage-rhel9@sha256:[a-f0-9]{64}$

  - it: should use colon for regular tags
    template: db_deployment.yaml
    set:
      db.image.repository: quay.io/cryostat/cryostat-db
      db.image.tag: "cryostat-v4.2"
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^quay\.io/cryostat/cryostat-db:cryostat-v4\.2$